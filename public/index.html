<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8590c">
<meta name="description" content="Order Up! Kitchen Chaos - Cook, assemble, and serve dishes in this fast-paced restaurant game!">
<meta property="og:title" content="Order Up! Kitchen Chaos">
<meta property="og:description" content="Run your kitchen! Cook at stations, assemble orders, and serve customers before they leave!">
<meta property="og:image" content="/assets/ui/icon.png">
<meta property="og:type" content="website">
<title>Order Up! Kitchen Chaos</title>
<link rel="icon" type="image/png" href="/assets/ui/icon.png">
<link rel="apple-touch-icon" href="/assets/ui/icon.png">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1a0f0a;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;width:100%;height:100%;object-fit:contain;cursor:pointer}

/* Loading */
#loading{position:fixed;inset:0;background:#1a0f0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
#loading.done{opacity:0;pointer-events:none}
#loading h1{font-size:2.2rem;color:#e8590c;margin-bottom:4px;text-shadow:0 2px 8px rgba(232,89,12,.4)}
#loading p{color:#a8896a;margin-bottom:20px;font-size:.95rem}
.load-bar{width:220px;height:8px;background:#2a1a14;border-radius:4px;overflow:hidden;border:1px solid #3a2a1e}
.load-fill{height:100%;background:linear-gradient(90deg,#e8590c,#f59e0b);width:0%;transition:width .2s;border-radius:4px}
</style>
</head>
<body>
<div id="loading">
  <h1>Order Up!</h1>
  <p>Kitchen Chaos</p>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
</div>
<canvas id="game"></canvas>

<script>
(function(){
'use strict';

// ============================================================
// ORDER UP! KITCHEN CHAOS — Time Management Cooking Game
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const loadFill = document.getElementById('loadFill');
const loadingEl = document.getElementById('loading');

// ----- RESPONSIVE CANVAS -----
let W = 800, H = 600, SCALE = 1;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  // Maintain 4:3ish aspect
  const aspect = 4/3;
  let cw, ch;
  if (w / h > aspect) { ch = h; cw = h * aspect; }
  else { cw = w; ch = w / aspect; }
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  W = canvas.width;
  H = canvas.height;
  SCALE = W / 800;
  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ----- COLORS -----
const C = {
  bg: '#2a1810', wallTop: '#5c3a28', wallBot: '#3d2418', counter: '#8B6914',
  counterTop: '#a07828', counterFront: '#6b5010', floor: '#4a3020',
  stationBg: '#3a2818', stationBorder: '#5a4020', stationActive: '#e8590c',
  plateBase: '#e8e0d0', plateShadow: '#c0b8a0',
  textWhite: '#fff', textGold: '#f5c542', textRed: '#ff4444', textGreen: '#44cc44',
  textDim: '#a08060', uiBg: 'rgba(20,12,8,.85)', uiBorder: '#5a4020',
  heart: '#ff3355', heartLow: '#882233',
  bubbleBg: 'rgba(255,255,255,.95)', bubbleBorder: '#ccc',
};

// ----- FOOD DEFINITIONS -----
const FOODS = [
  { id: 'egg',     name: 'Fried Egg',   emoji: '🍳', color: '#f5d442', cookTime: 2.0, station: 'grill' },
  { id: 'bacon',   name: 'Bacon',       emoji: '🥓', color: '#c0422a', cookTime: 2.5, station: 'grill' },
  { id: 'burger',  name: 'Burger',      emoji: '🍔', color: '#8B4513', cookTime: 3.0, station: 'grill' },
  { id: 'fries',   name: 'Fries',       emoji: '🍟', color: '#f5c542', cookTime: 3.5, station: 'fryer' },
  { id: 'chicken', name: 'Chicken',     emoji: '🍗', color: '#d4a050', cookTime: 4.0, station: 'fryer' },
  { id: 'fish',    name: 'Fish',        emoji: '🐟', color: '#5090c0', cookTime: 3.5, station: 'fryer' },
  { id: 'salad',   name: 'Salad',       emoji: '🥗', color: '#44aa44', cookTime: 1.5, station: 'chop' },
  { id: 'tomato',  name: 'Tomato Soup', emoji: '🍅', color: '#cc3322', cookTime: 3.0, station: 'pot' },
  { id: 'steak',   name: 'Steak',       emoji: '🥩', color: '#993322', cookTime: 5.0, station: 'grill' },
  { id: 'pasta',   name: 'Pasta',       emoji: '🍝', color: '#dda040', cookTime: 4.0, station: 'pot' },
  { id: 'pizza',   name: 'Pizza',       emoji: '🍕', color: '#dd8822', cookTime: 5.0, station: 'oven' },
  { id: 'cake',    name: 'Cake',        emoji: '🍰', color: '#e8a0b0', cookTime: 6.0, station: 'oven' },
];

// ----- STATIONS -----
const STATIONS = [
  { id: 'grill', name: 'Grill',   emoji: '🔥', x: 80,  y: 280, w: 120, h: 90 },
  { id: 'fryer', name: 'Fryer',   emoji: '🫕', x: 230, y: 280, w: 120, h: 90 },
  { id: 'chop',  name: 'Chop',    emoji: '🔪', x: 380, y: 280, w: 120, h: 90 },
  { id: 'pot',   name: 'Pot',     emoji: '🍲', x: 530, y: 280, w: 120, h: 90 },
  { id: 'oven',  name: 'Oven',    emoji: '♨️', x: 680, y: 280, w: 120, h: 90 },
];

// ----- CUSTOMER SEATS -----
const SEATS = [
  { x: 100, y: 140 },
  { x: 250, y: 140 },
  { x: 400, y: 140 },
  { x: 550, y: 140 },
  { x: 700, y: 140 },
];

// ----- CUSTOMER TYPES -----
const CUSTOMER_TYPES = [
  { emoji: '👨', patience: 1.0, tip: 1.0 },
  { emoji: '👩', patience: 1.0, tip: 1.0 },
  { emoji: '👴', patience: 1.3, tip: 1.2 },
  { emoji: '👵', patience: 1.3, tip: 1.2 },
  { emoji: '🧑', patience: 0.9, tip: 1.0 },
  { emoji: '👨‍🍳', patience: 0.7, tip: 1.5 },
  { emoji: '🤵', patience: 0.6, tip: 2.0 },
  { emoji: '👸', patience: 0.5, tip: 2.5 },
];

// ----- LEVELS -----
function makeLevel(num) {
  const foodPool = FOODS.slice(0, Math.min(3 + num, FOODS.length));
  const customerCount = Math.min(5 + num * 2, 20);
  const maxItems = Math.min(1 + Math.floor(num / 2), 3);
  const basePatience = Math.max(25 - num * 1.5, 10);
  const spawnInterval = Math.max(6 - num * 0.3, 2.5);
  return { num, foodPool, customerCount, maxItems, basePatience, spawnInterval };
}

// ----- GAME STATE -----
let game = {
  screen: 'title',  // title, playing, levelComplete, gameOver, achievements
  level: null,
  levelNum: 1,
  coins: 0,
  totalCoins: 0,
  score: 0,
  stars: 0,
  customersServed: 0,
  customersLost: 0,
  customers: [],       // active customers at seats
  stations: {},        // station cooking state
  plate: [],           // assembled items on serving plate
  spawnTimer: 0,
  spawned: 0,
  totalCustomersThisLevel: 0,
  combo: 0,
  comboTimer: 0,
  achievements: [],
  totalDishesServed: 0,
  totalClicks: 0,
  perfectOrders: 0,
  highestCombo: 0,
  floats: [],          // floating text animations
  particles: [],
  time: 0,
  shakeTimer: 0,
  selectedStation: null,
};

// Init stations
function initStations() {
  game.stations = {};
  STATIONS.forEach(s => {
    game.stations[s.id] = { cooking: null, food: null, progress: 0, done: false, burned: false };
  });
}
initStations();

// ----- ACHIEVEMENTS -----
const ACH_DEFS = [
  { id: 'startingyourempire',  name: 'Starting Your Empire',  desc: 'Complete level 1' },
  { id: 'onaroll',             name: 'On a Roll',             desc: 'Get a 3x combo' },
  { id: 'dozen',               name: 'Dozen',                 desc: 'Serve 12 dishes total' },
  { id: 'fastfood',            name: 'Fast Food',             desc: 'Serve with 80%+ patience' },
  { id: 'knifeskills',         name: 'Knife Skills',          desc: 'Use the chop station 10 times' },
  { id: 'spicemaster',         name: 'Spice Master',          desc: 'Serve all food types' },
  { id: 'spicemerchant',       name: 'Spice Merchant',        desc: 'Earn 500 coins' },
  { id: 'hiredhelp',           name: 'Hired Help',            desc: 'Reach level 3' },
  { id: 'chefdecuisine',       name: 'Chef de Cuisine',       desc: 'Reach level 5' },
  { id: 'piggybank',           name: 'Piggy Bank',            desc: 'Earn 1000 coins' },
  { id: 'moneybags',           name: 'Money Bags',            desc: 'Earn 5000 coins' },
  { id: 'golden',              name: 'Golden',                desc: 'Get 3 stars on a level' },
  { id: 'patronpleaser',       name: 'Patron Pleaser',        desc: 'Serve 50 dishes' },
  { id: 'impressiveindeed',    name: 'Impressive Indeed',     desc: 'Get a 5x combo' },
  { id: 'makingthegrade',      name: 'Making the Grade',      desc: 'Complete 3 levels' },
  { id: 'fullmenu',            name: 'Full Menu',             desc: 'Unlock all food types' },
  { id: 'greasejockey',        name: 'Grease Jockey',         desc: 'Use the fryer 20 times' },
  { id: 'firefighter',         name: 'Firefighter',           desc: 'Burn 5 dishes (oops!)' },
  { id: 'pepperchop',          name: 'Pepper Chop',           desc: 'Serve 3 orders in 15 sec' },
  { id: 'perfect4',            name: 'Perfect 4',             desc: '4 perfect orders in a row' },
  { id: 'pestcontrol',         name: 'Pest Control',          desc: 'Lose 0 customers in a level' },
  { id: 'headlines',           name: 'Headlines',             desc: 'Score 200 in one level' },
  { id: 'spotless',            name: 'Spotless',              desc: 'Complete level with no burns' },
  { id: 'squeakyclean',        name: 'Squeaky Clean',         desc: '3 levels with no burns' },
  { id: 'specialtreatment',    name: 'Special Treatment',     desc: 'Serve the VIP (👸)' },
  { id: 'steakula',            name: 'Steak-ula',             desc: 'Cook 10 steaks' },
  { id: 'dusty',               name: 'Dusty',                 desc: 'Play 10 levels' },
  { id: 'monkeybusiness',      name: 'Monkey Business',       desc: 'Tap 50 times in one level' },
  { id: 'ned',                 name: 'Ned',                   desc: 'Serve a 3-item order' },
  { id: 'exceptionalcuisine',  name: 'Exceptional Cuisine',   desc: 'Reach level 8' },
];

// Achievement tracking
let achTrack = { chopUses: 0, fryerUses: 0, burns: 0, steaks: 0, servedFoods: new Set(), cleanLevels: 0, perfectStreak: 0, recentServes: [] };

function checkAch(id) {
  if (!game.achievements.includes(id)) {
    game.achievements.push(id);
    addFloat(400, 60, '🏆 ' + ACH_DEFS.find(a=>a.id===id).name, '#f5c542', 2.5);
  }
}

// ----- SPAWN CUSTOMER -----
function spawnCustomer() {
  const level = game.level;
  // Find empty seat
  const emptySeats = SEATS.map((s,i) => i).filter(i => !game.customers.find(c => c.seat === i));
  if (emptySeats.length === 0) return;

  const seat = emptySeats[Math.floor(Math.random() * emptySeats.length)];
  const type = CUSTOMER_TYPES[Math.floor(Math.random() * CUSTOMER_TYPES.length)];
  const numItems = Math.min(1 + Math.floor(Math.random() * level.maxItems), level.maxItems);

  const order = [];
  for (let i = 0; i < numItems; i++) {
    const food = level.foodPool[Math.floor(Math.random() * level.foodPool.length)];
    order.push(food);
  }

  game.customers.push({
    seat,
    type,
    order,
    served: [],
    patience: level.basePatience * type.patience,
    maxPatience: level.basePatience * type.patience,
    state: 'waiting', // waiting, served, leaving
    enterAnim: 1.0,
    serveAnim: 0,
  });
  game.spawned++;
}

// ----- COOKING LOGIC -----
function startCooking(stationId, food) {
  const st = game.stations[stationId];
  if (st.cooking) return false;
  st.cooking = true;
  st.food = food;
  st.progress = 0;
  st.done = false;
  st.burned = false;

  // Track
  if (stationId === 'chop') achTrack.chopUses++;
  if (stationId === 'fryer') achTrack.fryerUses++;
  if (food.id === 'steak') achTrack.steaks++;
  if (achTrack.chopUses >= 10) checkAch('knifeskills');
  if (achTrack.fryerUses >= 20) checkAch('greasejockey');
  if (achTrack.steaks >= 10) checkAch('steakula');

  return true;
}

function collectFromStation(stationId) {
  const st = game.stations[stationId];
  if (!st.done || st.burned) {
    if (st.burned) {
      // Clear burned food
      st.cooking = null; st.food = null; st.progress = 0; st.done = false; st.burned = false;
      achTrack.burns++;
      if (achTrack.burns >= 5) checkAch('firefighter');
      addFloat(STATIONS.find(s=>s.id===stationId).x + 60, 260, '🔥 Burned!', C.textRed, 1.5);
      game.shakeTimer = 0.3;
    }
    return null;
  }
  const food = st.food;
  st.cooking = null; st.food = null; st.progress = 0; st.done = false;
  return food;
}

// ----- PLATE / SERVING -----
function addToPlate(food) {
  if (game.plate.length >= 3) return false;
  game.plate.push(food);
  return true;
}

function clearPlate() {
  game.plate = [];
}

function tryServeCustomer(custIndex) {
  const cust = game.customers[custIndex];
  if (!cust || cust.state !== 'waiting' || game.plate.length === 0) return false;

  // Check if plate matches order
  const orderIds = cust.order.map(f => f.id).sort();
  const plateIds = game.plate.map(f => f.id).sort();

  if (orderIds.length !== plateIds.length) return false;
  for (let i = 0; i < orderIds.length; i++) {
    if (orderIds[i] !== plateIds[i]) return false;
  }

  // Serve!
  const patienceRatio = cust.patience / cust.maxPatience;
  const tipMult = cust.type.tip;
  const comboMult = 1 + game.combo * 0.5;

  let baseScore = 10 * cust.order.length;
  let bonus = Math.floor(patienceRatio * 20);
  let total = Math.floor((baseScore + bonus) * tipMult * comboMult);

  game.score += total;
  game.coins += total;
  game.totalCoins += total;
  game.customersServed++;
  game.totalDishesServed++;
  game.combo++;
  game.comboTimer = 5;
  game.highestCombo = Math.max(game.highestCombo, game.combo);

  // Track serves for speed achievement
  achTrack.recentServes.push(game.time);
  achTrack.recentServes = achTrack.recentServes.filter(t => game.time - t < 15);

  // Track foods
  cust.order.forEach(f => achTrack.servedFoods.add(f.id));

  // Check achievements
  if (patienceRatio > 0.8) { checkAch('fastfood'); achTrack.perfectStreak++; }
  else achTrack.perfectStreak = 0;
  if (achTrack.perfectStreak >= 4) checkAch('perfect4');
  if (game.combo >= 3) checkAch('onaroll');
  if (game.combo >= 5) checkAch('impressiveindeed');
  if (game.totalDishesServed >= 12) checkAch('dozen');
  if (game.totalDishesServed >= 50) checkAch('patronpleaser');
  if (game.totalCoins >= 500) checkAch('spicemerchant');
  if (game.totalCoins >= 1000) checkAch('piggybank');
  if (game.totalCoins >= 5000) checkAch('moneybags');
  if (achTrack.servedFoods.size >= FOODS.length) checkAch('spicemaster');
  if (achTrack.recentServes.length >= 3) checkAch('pepperchop');
  if (cust.order.length >= 3) checkAch('ned');
  if (cust.type.emoji === '👸') checkAch('specialtreatment');

  cust.state = 'served';
  cust.serveAnim = 1.0;

  const seatPos = SEATS[cust.seat];
  addFloat(seatPos.x, seatPos.y - 30, '+' + total, C.textGold, 1.5);
  if (game.combo > 1) addFloat(seatPos.x, seatPos.y - 10, game.combo + 'x Combo!', '#ff8800', 1.2);

  // Particles
  for (let i = 0; i < 8; i++) {
    game.particles.push({
      x: seatPos.x, y: seatPos.y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 3 - 1,
      life: 1, color: C.textGold, size: 3 + Math.random() * 3
    });
  }

  clearPlate();
  return true;
}

// ----- FLOATING TEXT -----
function addFloat(x, y, text, color, duration) {
  game.floats.push({ x, y, text, color, life: duration || 1.5, maxLife: duration || 1.5 });
}

// ----- START LEVEL -----
function startLevel(num) {
  game.screen = 'playing';
  game.level = makeLevel(num);
  game.levelNum = num;
  game.score = 0;
  game.customersServed = 0;
  game.customersLost = 0;
  game.customers = [];
  game.plate = [];
  game.spawnTimer = 1;
  game.spawned = 0;
  game.totalCustomersThisLevel = game.level.customerCount;
  game.combo = 0;
  game.comboTimer = 0;
  game.floats = [];
  game.particles = [];
  game.time = 0;
  game.shakeTimer = 0;
  game.selectedStation = null;
  game.totalClicks = 0;
  achTrack.burns = 0;
  initStations();

  if (num >= 3) checkAch('hiredhelp');
  if (num >= 5) checkAch('chefdecuisine');
  if (num >= 8) checkAch('exceptionalcuisine');
  if (num >= 10) checkAch('dusty');
  if (game.levelNum > 1) checkAch('makingthegrade');
}

// ----- UPDATE -----
function update(dt) {
  if (game.screen !== 'playing') return;

  game.time += dt;
  game.shakeTimer = Math.max(0, game.shakeTimer - dt);

  // Combo timer
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0) game.combo = 0;
  }

  // Spawn customers
  game.spawnTimer -= dt;
  if (game.spawnTimer <= 0 && game.spawned < game.totalCustomersThisLevel) {
    spawnCustomer();
    game.spawnTimer = game.level.spawnInterval;
  }

  // Update customers
  for (let i = game.customers.length - 1; i >= 0; i--) {
    const c = game.customers[i];
    c.enterAnim = Math.max(0, c.enterAnim - dt * 3);

    if (c.state === 'waiting') {
      c.patience -= dt;
      if (c.patience <= 0) {
        c.state = 'leaving';
        game.customersLost++;
        game.combo = 0;
        achTrack.perfectStreak = 0;
        addFloat(SEATS[c.seat].x, SEATS[c.seat].y - 20, '😠 Left!', C.textRed, 1.5);
        game.shakeTimer = 0.2;
      }
    }

    if (c.state === 'served') {
      c.serveAnim -= dt * 2;
      if (c.serveAnim <= 0) {
        game.customers.splice(i, 1);
        continue;
      }
    }

    if (c.state === 'leaving') {
      c.enterAnim += dt * 3;
      if (c.enterAnim >= 1) {
        game.customers.splice(i, 1);
      }
    }
  }

  // Update stations (cooking progress)
  STATIONS.forEach(s => {
    const st = game.stations[s.id];
    if (st.cooking && !st.done) {
      st.progress += dt / st.food.cookTime;
      if (st.progress >= 1.0) {
        st.done = true;
        st.progress = 1.0;
        addFloat(s.x + 60, s.y - 10, '✅ Ready!', C.textGreen, 1);
      }
    }
    // Burn if left too long after done
    if (st.done && !st.burned) {
      st.progress += dt * 0.15;
      if (st.progress >= 1.5) {
        st.burned = true;
        addFloat(s.x + 60, s.y - 10, '🔥 Burning!', C.textRed, 1);
        game.shakeTimer = 0.15;
      }
    }
  });

  // Update floats
  for (let i = game.floats.length - 1; i >= 0; i--) {
    game.floats[i].life -= dt;
    game.floats[i].y -= dt * 30;
    if (game.floats[i].life <= 0) game.floats.splice(i, 1);
  }

  // Update particles
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += dt * 5;
    p.life -= dt * 1.5;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  // Check level complete
  if (game.spawned >= game.totalCustomersThisLevel && game.customers.length === 0) {
    endLevel();
  }
}

function endLevel() {
  // Calculate stars
  const serveRate = game.customersServed / game.totalCustomersThisLevel;
  if (serveRate >= 0.9) game.stars = 3;
  else if (serveRate >= 0.7) game.stars = 2;
  else if (serveRate >= 0.5) game.stars = 1;
  else game.stars = 0;

  if (game.stars >= 3) checkAch('golden');
  if (game.score >= 200) checkAch('headlines');
  if (game.customersLost === 0) checkAch('pestcontrol');
  if (achTrack.burns === 0) { checkAch('spotless'); achTrack.cleanLevels++; }
  if (achTrack.cleanLevels >= 3) checkAch('squeakyclean');
  if (game.totalClicks >= 50) checkAch('monkeybusiness');
  if (game.levelNum === 1 && game.stars > 0) checkAch('startingyourempire');

  if (game.level.foodPool.length >= FOODS.length) checkAch('fullmenu');

  game.screen = game.stars > 0 ? 'levelComplete' : 'gameOver';
  saveGame();
}

// ----- DRAWING -----
function draw() {
  ctx.save();

  // Screen shake
  if (game.shakeTimer > 0) {
    const shake = game.shakeTimer * 8;
    ctx.translate(Math.random() * shake - shake/2, Math.random() * shake - shake/2);
  }

  if (game.screen === 'title') drawTitle();
  else if (game.screen === 'playing') drawGame();
  else if (game.screen === 'levelComplete') drawLevelComplete();
  else if (game.screen === 'gameOver') drawGameOver();
  else if (game.screen === 'achievements') drawAchievements();

  ctx.restore();
}

function drawTitle() {
  // Background
  drawKitchenBg();

  // Overlay
  ctx.fillStyle = 'rgba(10,5,2,.7)';
  ctx.fillRect(0, 0, 800, 600);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = C.textGold;
  ctx.font = 'bold 52px sans-serif';
  ctx.fillText('ORDER UP!', 400, 170);
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#e8590c';
  ctx.fillText('Kitchen Chaos', 400, 210);

  // Decorative food emojis
  ctx.font = '40px sans-serif';
  const emojis = ['🍳','🍔','🍟','🍕','🥗','🍝','🥩','🍰'];
  emojis.forEach((e, i) => {
    const angle = (i / emojis.length) * Math.PI * 2 + game.time * 0.3;
    const x = 400 + Math.cos(angle) * 120;
    const y = 300 + Math.sin(angle) * 60;
    ctx.globalAlpha = 0.7;
    ctx.fillText(e, x, y);
  });
  ctx.globalAlpha = 1;

  // Play button
  drawButton(300, 380, 200, 55, '▶  PLAY', '#e8590c', '#c2410c');

  // Achievements button
  drawButton(300, 450, 200, 45, '🏆 Trophies (' + game.achievements.length + '/30)', '#5a4020', '#3d2a15');

  // Level display
  ctx.font = '16px sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('Level ' + game.levelNum + '  |  Coins: ' + game.totalCoins, 400, 530);

  // Credits
  ctx.font = '12px sans-serif';
  ctx.fillStyle = 'rgba(160,128,96,.5)';
  ctx.fillText('Built from Order Up! assets', 400, 575);
}

function drawKitchenBg() {
  // Wall
  const wallGrad = ctx.createLinearGradient(0, 0, 0, 240);
  wallGrad.addColorStop(0, '#5c3a28');
  wallGrad.addColorStop(1, '#3d2418');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, 800, 240);

  // Wall tiles pattern
  ctx.fillStyle = 'rgba(255,255,255,.03)';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 11; c++) {
      const offset = r % 2 === 0 ? 0 : 37;
      ctx.fillRect(c * 75 + offset, r * 60, 72, 57);
    }
  }

  // Counter
  ctx.fillStyle = C.counterTop;
  ctx.fillRect(0, 240, 800, 15);
  ctx.fillStyle = C.counter;
  ctx.fillRect(0, 255, 800, 25);
  const counterShine = ctx.createLinearGradient(0, 240, 0, 255);
  counterShine.addColorStop(0, 'rgba(255,255,255,.15)');
  counterShine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = counterShine;
  ctx.fillRect(0, 240, 800, 15);

  // Floor
  ctx.fillStyle = C.floor;
  ctx.fillRect(0, 280, 800, 320);

  // Floor tiles
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 11; c++) {
      if ((r + c) % 2 === 0) ctx.fillRect(c * 75, 280 + r * 40, 75, 40);
    }
  }
}

function drawGame() {
  drawKitchenBg();

  // ----- Draw Stations -----
  STATIONS.forEach(s => {
    const st = game.stations[s.id];
    const isSelected = game.selectedStation === s.id;

    // Station box
    ctx.fillStyle = st.burned ? '#4a1a10' : st.done ? '#1a3a18' : isSelected ? '#3a2a18' : C.stationBg;
    ctx.strokeStyle = st.burned ? '#ff3333' : st.done ? '#44cc44' : isSelected ? C.stationActive : C.stationBorder;
    ctx.lineWidth = isSelected ? 3 : 1.5;
    roundRect(s.x, s.y, s.w, s.h, 8, true, true);

    // Station label
    ctx.textAlign = 'center';
    ctx.font = '28px sans-serif';
    ctx.fillText(s.emoji, s.x + s.w/2, s.y + 35);
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = C.textWhite;
    ctx.fillText(s.name, s.x + s.w/2, s.y + 55);

    // Cooking progress bar
    if (st.cooking) {
      const barW = s.w - 20;
      const barH = 8;
      const barX = s.x + 10;
      const barY = s.y + s.h - 18;

      ctx.fillStyle = '#1a1008';
      roundRect(barX, barY, barW, barH, 3, true, false);

      const pct = Math.min(st.progress, 1);
      const burnPct = st.progress > 1 ? Math.min((st.progress - 1) / 0.5, 1) : 0;
      ctx.fillStyle = st.burned ? '#ff2222' : st.done ? (burnPct > 0 ? `rgb(${68+187*burnPct},${204-180*burnPct},${68-60*burnPct})` : '#44cc44') : '#e8590c';
      roundRect(barX, barY, barW * Math.min(pct, 1), barH, 3, true, false);

      // Food icon on station
      ctx.font = '20px sans-serif';
      ctx.fillText(st.food.emoji, s.x + s.w/2, s.y + 78);
    }
  });

  // ----- Draw Customers -----
  game.customers.forEach(c => {
    const seat = SEATS[c.seat];
    const offsetY = c.enterAnim * -80 + (c.state === 'served' ? (1 - c.serveAnim) * 30 : 0);
    const alpha = c.state === 'served' ? c.serveAnim : (c.state === 'leaving' ? 1 - c.enterAnim : 1);

    ctx.globalAlpha = alpha;

    // Customer body
    const cx = seat.x;
    const cy = seat.y + offsetY;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.2)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 35, 25, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.type.emoji, cx, cy + 20);

    // Patience bar
    if (c.state === 'waiting') {
      const pRatio = c.patience / c.maxPatience;
      const barW = 50;
      const barX = cx - barW/2;
      const barY = cy - 30;

      ctx.fillStyle = '#1a0f0a';
      roundRect(barX, barY, barW, 6, 3, true, false);

      ctx.fillStyle = pRatio > 0.5 ? '#44cc44' : pRatio > 0.25 ? '#ddaa00' : '#ff3333';
      roundRect(barX, barY, barW * pRatio, 6, 3, true, false);

      // Order bubble
      const bubbleW = 30 * c.order.length + 16;
      const bubbleH = 36;
      const bubbleX = cx - bubbleW/2;
      const bubbleY = cy - 72;

      // Bubble with pointer
      ctx.fillStyle = C.bubbleBg;
      ctx.strokeStyle = C.bubbleBorder;
      ctx.lineWidth = 1;
      roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 8, true, true);

      // Pointer triangle
      ctx.fillStyle = C.bubbleBg;
      ctx.beginPath();
      ctx.moveTo(cx - 6, bubbleY + bubbleH);
      ctx.lineTo(cx, bubbleY + bubbleH + 8);
      ctx.lineTo(cx + 6, bubbleY + bubbleH);
      ctx.fill();

      // Food emojis in bubble
      ctx.font = '22px sans-serif';
      c.order.forEach((food, fi) => {
        ctx.fillText(food.emoji, bubbleX + 20 + fi * 30, bubbleY + 25);
      });
    }

    // Served check
    if (c.state === 'served') {
      ctx.font = '30px sans-serif';
      ctx.fillText('😊', cx, cy - 20);
    }

    ctx.globalAlpha = 1;
  });

  // ----- Draw Plate Area -----
  const plateX = 280, plateY = 415, plateW = 240, plateH = 65;
  ctx.fillStyle = '#2a1a10';
  ctx.strokeStyle = game.plate.length > 0 ? C.textGold : C.stationBorder;
  ctx.lineWidth = 2;
  roundRect(plateX, plateY, plateW, plateH, 10, true, true);

  ctx.textAlign = 'center';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('SERVING PLATE', plateX + plateW/2, plateY + 14);

  if (game.plate.length === 0) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(160,128,96,.4)';
    ctx.fillText('Tap station to cook, tap ✅ to collect', plateX + plateW/2, plateY + 42);
  } else {
    ctx.font = '28px sans-serif';
    game.plate.forEach((food, i) => {
      ctx.fillText(food.emoji, plateX + 40 + i * 70, plateY + 48);
    });
  }

  // Clear plate button
  if (game.plate.length > 0) {
    drawSmallBtn(plateX + plateW - 30, plateY + 5, 25, 20, '✕', '#882222');
  }

  // ----- Serve Buttons on Customers -----
  if (game.plate.length > 0) {
    game.customers.forEach(c => {
      if (c.state !== 'waiting') return;
      const seat = SEATS[c.seat];
      // Check if order matches
      const orderIds = c.order.map(f => f.id).sort();
      const plateIds = game.plate.map(f => f.id).sort();
      let match = orderIds.length === plateIds.length;
      if (match) {
        for (let i = 0; i < orderIds.length; i++) {
          if (orderIds[i] !== plateIds[i]) { match = false; break; }
        }
      }
      if (match) {
        drawSmallBtn(seat.x - 22, seat.y + 30, 44, 22, 'SERVE', '#228822');
      }
    });
  }

  // ----- Food Menu (what can be cooked) -----
  const menuY = 495;
  ctx.fillStyle = C.uiBg;
  ctx.fillRect(0, menuY - 10, 800, 120);
  ctx.fillStyle = C.uiBorder;
  ctx.fillRect(0, menuY - 10, 800, 2);

  ctx.textAlign = 'center';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('TAP FOOD TO COOK  →  COLLECT FROM STATION  →  SERVE TO CUSTOMER', 400, menuY + 3);

  const foodsAvail = game.level.foodPool;
  const foodW = Math.min(75, 750 / foodsAvail.length);
  const foodStartX = 400 - (foodsAvail.length * foodW) / 2;

  foodsAvail.forEach((food, i) => {
    const fx = foodStartX + i * foodW;
    const fy = menuY + 15;

    // Find if any station of this type is free
    const stationFree = !game.stations[food.station].cooking;
    ctx.globalAlpha = stationFree ? 1 : 0.35;

    ctx.fillStyle = '#2a1a10';
    ctx.strokeStyle = stationFree ? food.color : '#333';
    ctx.lineWidth = 1.5;
    roundRect(fx, fy, foodW - 6, 55, 6, true, true);

    ctx.font = '24px sans-serif';
    ctx.fillText(food.emoji, fx + (foodW-6)/2, fy + 28);
    ctx.font = '9px sans-serif';
    ctx.fillStyle = stationFree ? C.textWhite : '#666';
    ctx.fillText(food.name, fx + (foodW-6)/2, fy + 46);

    ctx.globalAlpha = 1;
  });

  // ----- HUD -----
  // Top bar
  ctx.fillStyle = C.uiBg;
  ctx.fillRect(0, 0, 800, 36);
  ctx.fillStyle = C.uiBorder;
  ctx.fillRect(0, 36, 800, 2);

  ctx.textAlign = 'left';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = C.textWhite;
  ctx.fillText('Level ' + game.levelNum, 12, 24);

  ctx.textAlign = 'center';
  ctx.fillStyle = C.textGold;
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('Score: ' + game.score, 400, 24);

  ctx.textAlign = 'right';
  ctx.font = '13px sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('🪙 ' + game.totalCoins, 788, 16);
  ctx.fillText(game.customersServed + '/' + game.totalCustomersThisLevel + ' served', 788, 30);

  // Combo indicator
  if (game.combo > 1) {
    ctx.textAlign = 'left';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#ff8800';
    ctx.fillText(game.combo + 'x COMBO!', 120, 24);
  }

  // ----- Floating Text -----
  game.floats.forEach(f => {
    const alpha = f.life / f.maxLife;
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;

  // Particles
  game.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawLevelComplete() {
  drawKitchenBg();
  ctx.fillStyle = 'rgba(10,5,2,.8)';
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.font = 'bold 40px sans-serif';
  ctx.fillStyle = C.textGold;
  ctx.fillText('Level ' + game.levelNum + ' Complete!', 400, 140);

  // Stars
  ctx.font = '50px sans-serif';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < game.stars ? C.textGold : '#333';
    ctx.fillText('⭐', 310 + i * 60, 210);
  }

  ctx.font = '20px sans-serif';
  ctx.fillStyle = C.textWhite;
  ctx.fillText('Score: ' + game.score, 400, 270);
  ctx.fillText('Served: ' + game.customersServed + '/' + game.totalCustomersThisLevel, 400, 300);
  ctx.fillText('Coins: +' + game.score, 400, 330);

  if (game.highestCombo > 1) {
    ctx.fillStyle = '#ff8800';
    ctx.fillText('Best Combo: ' + game.highestCombo + 'x', 400, 360);
  }

  drawButton(250, 400, 130, 50, 'NEXT ▶', '#e8590c', '#c2410c');
  drawButton(420, 400, 130, 50, 'MENU', '#5a4020', '#3d2a15');
}

function drawGameOver() {
  drawKitchenBg();
  ctx.fillStyle = 'rgba(10,5,2,.85)';
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.font = 'bold 40px sans-serif';
  ctx.fillStyle = C.textRed;
  ctx.fillText('Kitchen Closed!', 400, 160);

  ctx.font = '18px sans-serif';
  ctx.fillStyle = C.textDim;
  ctx.fillText('Too many customers left unhappy', 400, 200);

  ctx.font = '20px sans-serif';
  ctx.fillStyle = C.textWhite;
  ctx.fillText('Score: ' + game.score, 400, 260);
  ctx.fillText('Served: ' + game.customersServed + '/' + game.totalCustomersThisLevel, 400, 290);

  drawButton(250, 350, 130, 50, 'RETRY', '#e8590c', '#c2410c');
  drawButton(420, 350, 130, 50, 'MENU', '#5a4020', '#3d2a15');
}

function drawAchievements() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, 800, 600);

  ctx.textAlign = 'center';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = C.textGold;
  ctx.fillText('🏆 Crystal Collection (' + game.achievements.length + '/30)', 400, 40);

  const cols = 6;
  const cellW = 115, cellH = 90;
  const startX = 400 - (cols * cellW) / 2;

  ACH_DEFS.forEach((a, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * cellW;
    const y = 60 + row * cellH;
    const unlocked = game.achievements.includes(a.id);

    ctx.fillStyle = unlocked ? 'rgba(245,197,66,.08)' : 'rgba(30,20,15,.5)';
    ctx.strokeStyle = unlocked ? C.textGold : '#3a2a1e';
    ctx.lineWidth = 1;
    roundRect(x + 4, y + 4, cellW - 8, cellH - 8, 6, true, true);

    // Try to draw achievement image
    const img = achImages[a.id];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.globalAlpha = unlocked ? 1 : 0.2;
      ctx.drawImage(img, x + cellW/2 - 20, y + 12, 40, 40);
      ctx.globalAlpha = 1;
    } else {
      ctx.font = '28px sans-serif';
      ctx.globalAlpha = unlocked ? 1 : 0.2;
      ctx.fillText(unlocked ? '💎' : '🔒', x + cellW/2, y + 44);
      ctx.globalAlpha = 1;
    }

    ctx.font = '9px sans-serif';
    ctx.fillStyle = unlocked ? C.textGold : C.textDim;
    ctx.fillText(a.name, x + cellW/2, y + 64);
    ctx.font = '8px sans-serif';
    ctx.fillStyle = C.textDim;
    ctx.fillText(a.desc, x + cellW/2, y + 76);
  });

  drawButton(325, 555, 150, 35, '← BACK', '#5a4020', '#3d2a15');
}

// ----- UI HELPERS -----
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawButton(x, y, w, h, text, color, darkColor) {
  ctx.fillStyle = darkColor;
  roundRect(x, y + 3, w, h, 8, true, false);
  ctx.fillStyle = color;
  roundRect(x, y, w, h, 8, true, false);
  const shine = ctx.createLinearGradient(x, y, x, y + h);
  shine.addColorStop(0, 'rgba(255,255,255,.15)');
  shine.addColorStop(0.5, 'rgba(255,255,255,0)');
  ctx.fillStyle = shine;
  roundRect(x, y, w, h, 8, true, false);
  ctx.textAlign = 'center';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(text, x + w/2, y + h/2 + 6);
}

function drawSmallBtn(x, y, w, h, text, color) {
  ctx.fillStyle = color;
  roundRect(x, y, w, h, 4, true, false);
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(text, x + w/2, y + h/2 + 4);
}

// ----- INPUT -----
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / rect.width * 800;
  const cy = (e.clientY - rect.top) / rect.height * 600;
  return { x: cx, y: cy };
}

function hitTest(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

function handleClick(e) {
  const pos = getCanvasPos(e);
  const { x, y } = pos;
  game.totalClicks++;

  if (game.screen === 'title') {
    if (hitTest(x, y, 300, 380, 200, 55)) startLevel(game.levelNum);
    else if (hitTest(x, y, 300, 450, 200, 45)) game.screen = 'achievements';
    return;
  }

  if (game.screen === 'levelComplete') {
    if (hitTest(x, y, 250, 400, 130, 50)) startLevel(game.levelNum + 1);
    else if (hitTest(x, y, 420, 400, 130, 50)) game.screen = 'title';
    return;
  }

  if (game.screen === 'gameOver') {
    if (hitTest(x, y, 250, 350, 130, 50)) startLevel(game.levelNum);
    else if (hitTest(x, y, 420, 350, 130, 50)) game.screen = 'title';
    return;
  }

  if (game.screen === 'achievements') {
    if (hitTest(x, y, 325, 555, 150, 35)) game.screen = 'title';
    return;
  }

  if (game.screen !== 'playing') return;

  // Check food menu clicks
  const menuY = 495;
  const foodsAvail = game.level.foodPool;
  const foodW = Math.min(75, 750 / foodsAvail.length);
  const foodStartX = 400 - (foodsAvail.length * foodW) / 2;

  for (let i = 0; i < foodsAvail.length; i++) {
    const fx = foodStartX + i * foodW;
    const fy = menuY + 15;
    if (hitTest(x, y, fx, fy, foodW - 6, 55)) {
      const food = foodsAvail[i];
      const st = game.stations[food.station];
      if (!st.cooking) {
        startCooking(food.station, food);
        game.selectedStation = food.station;
      }
      return;
    }
  }

  // Check station clicks (collect cooked food)
  for (const s of STATIONS) {
    if (hitTest(x, y, s.x, s.y, s.w, s.h)) {
      const st = game.stations[s.id];
      if (st.done || st.burned) {
        const food = collectFromStation(s.id);
        if (food) addToPlate(food);
      }
      game.selectedStation = s.id;
      return;
    }
  }

  // Check serve to customer
  if (game.plate.length > 0) {
    for (let i = 0; i < game.customers.length; i++) {
      const c = game.customers[i];
      if (c.state !== 'waiting') continue;
      const seat = SEATS[c.seat];
      // Click on customer or serve button area
      if (hitTest(x, y, seat.x - 40, seat.y - 80, 80, 140)) {
        if (tryServeCustomer(i)) return;
      }
    }
  }

  // Clear plate button
  const plateX = 280, plateY = 415, plateW = 240;
  if (game.plate.length > 0 && hitTest(x, y, plateX + plateW - 35, plateY, 35, 25)) {
    clearPlate();
    return;
  }
}

canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches[0]) {
    handleClick({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
  }
}, { passive: false });

// ----- SAVE / LOAD -----
const SAVE_KEY = 'orderup_chaos_v2';

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      levelNum: game.screen === 'playing' ? game.levelNum : (game.screen === 'levelComplete' ? game.levelNum + 1 : game.levelNum),
      totalCoins: game.totalCoins,
      achievements: game.achievements,
      totalDishesServed: game.totalDishesServed,
      highestCombo: game.highestCombo,
    }));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      game.levelNum = data.levelNum || 1;
      game.totalCoins = data.totalCoins || 0;
      game.achievements = data.achievements || [];
      game.totalDishesServed = data.totalDishesServed || 0;
      game.highestCombo = data.highestCombo || 0;
    }
  } catch(e) {}
}

// ----- PRELOAD ACHIEVEMENT IMAGES -----
const achImages = {};
let loadedCount = 0;
const totalToLoad = ACH_DEFS.length + 1;

function onAssetLoad() {
  loadedCount++;
  loadFill.style.width = (loadedCount / totalToLoad * 100) + '%';
  if (loadedCount >= totalToLoad) finishLoading();
}

ACH_DEFS.forEach(a => {
  const img = new Image();
  img.onload = onAssetLoad;
  img.onerror = onAssetLoad;
  img.src = '/assets/achievements/icon_achievements_crystal_' + a.id + '.png';
  achImages[a.id] = img;
});
// Icon
const iconImg = new Image();
iconImg.onload = onAssetLoad;
iconImg.onerror = onAssetLoad;
iconImg.src = '/assets/ui/icon.png';

// Failsafe
setTimeout(finishLoading, 4000);

let started = false;
function finishLoading() {
  if (started) return;
  started = true;
  loadGame();
  loadingEl.classList.add('done');
  requestAnimationFrame(loop);
}

// ----- MAIN LOOP -----
let lastTime = 0;
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

// ----- SERVICE WORKER -----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

})();
