  if(w/h>a){ch=h;cw=h*a}else{cw=w;ch=w/a}
  cv.width=Math.round(cw*dpr);cv.height=Math.round(ch*dpr);
  cv.style.width=cw+'px';cv.style.height=ch+'px';
  W=cv.width;H=cv.height;SC=W/800;

}

// ── COOKING STATIONS ──

// ── CUSTOMER TYPES ──
const CUST_TYPES=[

  {id:'meat_lover',name:'Meat Lover',emoji:'💪',patience:0.85,tipMult:1.2},

];

// ── GAME STATE ──
let G={
  screen:'title', // title,worldmap,restaurant,cooking,dayEnd,spiceRack,achievements,shop
  save:{
    coins:0,totalCoins:0,currentRestaurant:0,unlockedRestaurants:[0],
    stars:{},achievements:[],dishesServed:0,totalDays:0,
    helpers:{fry_guy:false,spice_guy:false},
    spicesOwned:{pepper:3,salt:3,garlic:0,herbs:0,sugar:0,soy:0},
    upgrades:{cookSpeed:0,patience:0,tipBonus:0},
  },
  // Cooking day state
  day:null,customers:[],stations:{},orders:[],plate:null,
  spiceTarget:null,selectedDish:null,
  score:0,tipsEarned:0,customersServed:0,customersLost:0,
  dayTimer:0,maxDayTime:90,
  combo:0,comboTimer:0,
  floats:[],particles:[],shakeT:0,time:0,
  // Minigame
  miniGame:null,
  // UI
  scroll:0,hover:null,achImages:{},
};

// ── HELPERS ──
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.floor(n).toString()}
function lerp(a,b,t){return a+(b-a)*t}
function rr(x,y,w,h,r,f,s){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath();if(f)cx.fill();if(s)cx.stroke()}
function addFloat(x,y,t,c,d){G.floats.push({x,y,text:t,color:c,life:d||1.5,max:d||1.5})}
function addParts(x,y,c,n){for(let i=0;i<(n||6);i++)G.particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*4-1,life:1,color:c,sz:2+Math.random()*3})}

// ── SAVE/LOAD ──
function save(){try{localStorage.setItem('orderup_v3',JSON.stringify(G.save))}catch(e){}}
function load(){try{const r=localStorage.getItem('orderup_v3');if(r)G.save=Object.assign(G.save,JSON.parse(r))}catch(e){}}

// ── RESTAURANT HELPERS ──
function curRest(){return RESTAURANTS[G.save.currentRestaurant]}
function getStationsForRestaurant(rest){
  const ids=new Set();
  rest.dishes.forEach(d=>ids.add(d.station));
  return STATION_DEFS.filter(s=>ids.has(s.id));
}

// ── START A DAY ──
function startDay(){
  const rest=curRest();
  G.screen='cooking';
  G.customers=[];G.orders=[];G.plate=null;G.spiceTarget=null;G.selectedDish=null;
  G.score=0;G.tipsEarned=0;G.customersServed=0;G.customersLost=0;
  G.combo=0;G.comboTimer=0;G.floats=[];G.particles=[];G.shakeT=0;G.time=0;
  G.dayTimer=G.maxDayTime;G.miniGame=null;
  const stns=getStationsForRestaurant(rest);
  G.stations={};
  stns.forEach(s=>{G.stations[s.id]={cooking:null,progress:0,done:false,burned:false,taps:0,needsTap:false}});
  G.day={rest,stns,spawnTimer:2,spawned:0,maxCustomers:8+G.save.currentRestaurant*3,seatCount:4};
  G.save.totalDays++;
}

// ── SPAWN CUSTOMER ──
function spawnCust(){
  if(G.customers.length>=G.day.seatCount)return;
  if(G.day.spawned>=G.day.maxCustomers)return;
  const rest=G.day.rest;
  // Pick customer type
  let type;
  if(G.day.spawned===G.day.maxCustomers-1&&Math.random()<0.3){
    type=CUST_TYPES.find(t=>t.isCritic);
  }else{
    const pool=CUST_TYPES.filter(t=>!t.isCritic&&!t.isInspector);
    type=pool[Math.floor(Math.random()*pool.length)];
  }
  // Pick order (1-3 dishes)
  const numDishes=Math.min(1+Math.floor(Math.random()*(1+G.save.currentRestaurant*0.5)),3);
  const order=[];
  for(let i=0;i<numDishes;i++){
    order.push(rest.dishes[Math.floor(Math.random()*rest.dishes.length)]);
  }
  // Find empty seat
  const taken=G.customers.map(c=>c.seat);
  let seat=-1;
  for(let i=0;i<G.day.seatCount;i++){if(!taken.includes(i)){seat=i;break;}}
  if(seat<0)return;

  const baseP=25+G.save.upgrades.patience*5;
  G.customers.push({
    type,order,served:[],seat,
    patience:baseP*type.patience,maxPatience:baseP*type.patience,
    state:'ordering',stateTimer:1.5,enterAnim:1,
    spiced:false,prefSpiceMet:false,
  });
  G.day.spawned++;
}

// ── COOKING ──
function startCook(stationId,dish){
  const st=G.stations[stationId];
  if(!st||st.cooking)return false;
  const speedMod=1-G.save.upgrades.cookSpeed*0.1;
  st.cooking=dish;st.progress=0;st.done=false;st.burned=false;st.taps=0;st.needsTap=false;
  st.cookTime=dish.time*speedMod;
  st.nextTap=0.3+Math.random()*0.3; // First tap at 30-60%
  return true;
}

function tapStation(stationId){
  const st=G.stations[stationId];
  if(!st||!st.cooking)return;
  if(st.done&&!st.burned){
    // Collect to plate
    G.plate={dish:st.cooking,quality:1+st.taps*0.1,spice:null};
    st.cooking=null;st.progress=0;st.done=false;st.taps=0;
    return;
  }
  if(st.burned){
    st.cooking=null;st.progress=0;st.done=false;st.burned=false;st.taps=0;
    G.shakeT=0.2;
    return;
  }
  // Tap for bonus (like flipping/stirring)
  if(st.needsTap){
    st.taps++;st.needsTap=false;
    const sdef=STATION_DEFS.find(s=>s.id===stationId);
    addFloat(400,250,sdef.action+'!','#4f4',0.8);
  }
}

function serveTo(custIdx){
  if(!G.plate)return false;
  const c=G.customers[custIdx];
  if(!c||c.state!=='waiting')return false;
  // Check if plate dish matches any in remaining order
  const idx=c.order.findIndex((d,i)=>!c.served[i]&&d.name===G.plate.dish.name);
  if(idx<0)return false;
  c.served[idx]=true;
  const pRatio=c.patience/c.maxPatience;
  let tip=Math.floor(G.plate.dish.value*G.plate.quality*(0.5+pRatio*0.5)*c.type.tipMult);
  if(G.plate.spice){
    tip=Math.floor(tip*(1+G.plate.spice.bonus));
    if(c.type.prefSpice===G.plate.spice.id){tip=Math.floor(tip*1.3);c.prefSpiceMet=true;}
  }
  tip=Math.floor(tip*(1+G.save.upgrades.tipBonus*0.1));
  // Combo
  G.combo++;G.comboTimer=4;
  if(G.combo>1)tip=Math.floor(tip*(1+G.combo*0.15));

  G.score+=tip;G.tipsEarned+=tip;
  const seatX=120+c.seat*170;
  addFloat(seatX,100,'+'+tip+' coins','#fc2',1.5);
  if(G.combo>1)addFloat(seatX,120,G.combo+'x Combo!','#f80',1);
  addParts(seatX,130,'#fc2',8);

  G.plate=null;

  // Check if fully served
  if(c.served.every(Boolean)){
    c.state='happy';c.stateTimer=1.2;
    G.customersServed++;G.save.dishesServed++;
    if(pRatio>0.7)addFloat(seatX,80,'😊 Great!','#4f4',1);
  }
  return true;
}

function applySpice(spice){
  if(!G.plate)return;
  if(G.save.spicesOwned[spice.id]<=0)return;
  G.plate.spice=spice;
  G.save.spicesOwned[spice.id]--;
  G.spiceTarget=null;
  addFloat(400,300,spice.emoji+' Seasoned!',spice.color,1);
}

// ── UPDATE ──
function update(dt){
  G.time+=dt;
  G.shakeT=Math.max(0,G.shakeT-dt);
  // Floats
  for(let i=G.floats.length-1;i>=0;i--){G.floats[i].life-=dt;G.floats[i].y-=dt*35;if(G.floats[i].life<=0)G.floats.splice(i,1);}
  for(let i=G.particles.length-1;i>=0;i--){const p=G.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=dt*6;p.life-=dt*1.5;if(p.life<=0)G.particles.splice(i,1);}
  if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0)G.combo=0;}

  if(G.screen!=='cooking')return;

  // Day timer
  G.dayTimer-=dt;
  if(G.dayTimer<=0){endDay();return;}

  // Spawn
  G.day.spawnTimer-=dt;
  if(G.day.spawnTimer<=0&&G.day.spawned<G.day.maxCustomers){
    spawnCust();
    G.day.spawnTimer=Math.max(3-G.save.currentRestaurant*0.3,1.5)+Math.random()*2;
  }

  // Customers
  for(let i=G.customers.length-1;i>=0;i--){
    const c=G.customers[i];
    c.enterAnim=Math.max(0,c.enterAnim-dt*3);
    if(c.state==='ordering'){
      c.stateTimer-=dt;
      if(c.stateTimer<=0)c.state='waiting';
    }
    if(c.state==='waiting'){
      c.patience-=dt;
      if(c.patience<=0){
        c.state='angry';c.stateTimer=1;
        G.customersLost++;G.combo=0;
        const sx=120+c.seat*170;
        addFloat(sx,100,'😠 Left!','#f44',1.5);
        G.shakeT=0.25;
      }
    }
    if(c.state==='happy'||c.state==='angry'){
      c.stateTimer-=dt;
      if(c.stateTimer<=0)G.customers.splice(i,1);
    }
  }

  // Stations
  Object.keys(G.stations).forEach(sid=>{
    const st=G.stations[sid];
    if(!st.cooking||st.done)return;
    const spd=1/st.cookTime;
    st.progress+=dt*spd;
    // Tap prompt
    if(!st.needsTap&&st.progress>=st.nextTap&&st.progress<1){
      st.needsTap=true;
      st.nextTap=st.progress+0.25+Math.random()*0.2;
    }
    if(st.progress>=1&&!st.done){
      st.done=true;st.progress=1;
    }
    // Burn
    if(st.done&&!st.burned){
      st.progress+=dt*0.12;
      if(st.progress>=1.6){st.burned=true;G.shakeT=0.15;}
    }
  });

  // Auto-helpers
  if(G.save.helpers.fry_guy&&G.stations.fryer){
    const st=G.stations.fryer;
    if(st.cooking&&st.needsTap){st.taps++;st.needsTap=false;}
  }
  if(G.save.helpers.spice_guy&&G.plate&&!G.plate.spice){
    // Auto-spice with pepper if available
    const avail=SPICES.find(s=>G.save.spicesOwned[s.id]>0);
    if(avail){G.plate.spice=avail;G.save.spicesOwned[avail.id]--;}
  }

  // Check if day should end
  if(G.day.spawned>=G.day.maxCustomers&&G.customers.length===0){
    endDay();
  }
}

function endDay(){
  // Calculate stars
  const rate=G.day.maxCustomers>0?G.customersServed/G.day.maxCustomers:0;
  let stars=0;
  if(rate>=0.9)stars=3;else if(rate>=0.7)stars=2;else if(rate>=0.4)stars=1;

  G.save.coins+=G.tipsEarned;G.save.totalCoins+=G.tipsEarned;
  const key=G.save.currentRestaurant+'';
  G.save.stars[key]=Math.max(G.save.stars[key]||0,stars);

  G.day.resultStars=stars;G.day.resultTips=G.tipsEarned;
  G.screen='dayEnd';
  checkAchievements();
  save();
}

// ── DRAWING ──
function draw(){
  cx.save();
  if(G.shakeT>0){const s=G.shakeT*10;cx.translate(Math.random()*s-s/2,Math.random()*s-s/2);}

  if(G.screen==='title')drawTitle();
  else if(G.screen==='worldmap')drawWorldMap();
  else if(G.screen==='restaurant')drawRestaurantMenu();
  else if(G.screen==='cooking')drawCooking();
  else if(G.screen==='dayEnd')drawDayEnd();
  else if(G.screen==='spiceRack')drawSpiceRack();
  else if(G.screen==='shop')drawShop();
  else if(G.screen==='achievements')drawAchScreen();

  // Floats & particles (always)
  G.floats.forEach(f=>{cx.globalAlpha=f.life/f.max;cx.textAlign='center';cx.font='bold 16px Georgia';cx.fillStyle=f.color;cx.fillText(f.text,f.x,f.y)});
  G.particles.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);cx.fill()});
  cx.globalAlpha=1;
  cx.restore();
}

// ── COOKING SCREEN (main gameplay) ──
function drawCooking(){
  const rest=G.day.rest;

  // Kitchen background
  const wg=cx.createLinearGradient(0,0,0,200);
  wg.addColorStop(0,'#4a2a18');wg.addColorStop(1,'#2e1a0e');
  cx.fillStyle=wg;cx.fillRect(0,0,800,200);
  // Tile pattern
  cx.fillStyle='rgba(255,255,255,.025)';
  for(let r=0;r<4;r++)for(let c=0;c<12;c++){const o=r%2?35:0;cx.fillRect(c*70+o,r*50,67,47);}
  // Counter
  cx.fillStyle='#a07828';cx.fillRect(0,195,800,12);
  cx.fillStyle='#806018';cx.fillRect(0,207,800,18);
  const csh=cx.createLinearGradient(0,195,0,207);csh.addColorStop(0,'rgba(255,255,255,.12)');csh.addColorStop(1,'rgba(255,255,255,0)');cx.fillStyle=csh;cx.fillRect(0,195,800,12);
  // Floor
  cx.fillStyle='#3a2418';cx.fillRect(0,225,800,375);
  cx.fillStyle='rgba(0,0,0,.06)';
  for(let r=0;r<10;r++)for(let c=0;c<12;c++)if((r+c)%2===0)cx.fillRect(c*70,225+r*38,70,38);

  // ── Customers ──
  G.customers.forEach(c=>{
    const sx=120+c.seat*170,sy=100;
    const oy=c.enterAnim*-60+(c.state==='happy'?20:0)+(c.state==='angry'?-30:0);
    const al=c.state==='happy'||c.state==='angry'?Math.max(0,c.stateTimer):1;
    cx.globalAlpha=al;

    // Customer body
    cx.font='34px sans-serif';cx.textAlign='center';
    cx.fillText(c.type.emoji,sx,sy+25+oy);

    // VIP indicator
    if(c.type.isCritic){cx.font='10px Georgia';cx.fillStyle='#f44';cx.fillText('CRITIC',sx,sy-35+oy);}

    // Patience bar
    if(c.state==='waiting'){
      const pr=c.patience/c.maxPatience;
      const bw=60,bx=sx-bw/2,by=sy-25+oy;
      cx.fillStyle='#1a0e06';rr(bx,by,bw,6,3,true,false);
      cx.fillStyle=pr>.5?'#4c4':pr>.25?'#cc0':'#c33';
      rr(bx,by,bw*Math.max(pr,0),6,3,true,false);
    }

    // Order bubble
    if(c.state==='waiting'||c.state==='ordering'){
      const bw=35*c.order.length+12,bh=38;
      const bx=sx-bw/2,by=sy-72+oy;
      cx.fillStyle='rgba(255,255,250,.92)';cx.strokeStyle='#cba';cx.lineWidth=1;
      rr(bx,by,bw,bh,8,true,true);
      // Pointer
      cx.fillStyle='rgba(255,255,250,.92)';
      cx.beginPath();cx.moveTo(sx-5,by+bh);cx.lineTo(sx,by+bh+7);cx.lineTo(sx+5,by+bh);cx.fill();
      // Food items
      cx.font='22px sans-serif';
      c.order.forEach((d,di)=>{
        cx.globalAlpha=c.served[di]?0.2:al;
        cx.fillText(d.emoji,bx+20+di*35,by+27);
        if(c.served[di]){cx.font='16px sans-serif';cx.fillText('✅',bx+28+di*35,by+30);cx.font='22px sans-serif';}
      });
    }

    // Reaction
    if(c.state==='happy'){cx.font='28px sans-serif';cx.fillText('😊',sx,sy-20+oy);}
    if(c.state==='angry'){cx.font='28px sans-serif';cx.fillText('😠',sx,sy-20+oy);}

    cx.globalAlpha=1;

    // Serve button
    if(G.plate&&c.state==='waiting'){
      const canServe=c.order.some((d,i)=>!c.served[i]&&d.name===G.plate.dish.name);
      if(canServe){
        cx.fillStyle='#285a28';rr(sx-25,sy+35,50,22,5,true,false);
        cx.font='bold 9px Georgia';cx.fillStyle='#fff';cx.textAlign='center';
        cx.fillText('SERVE',sx,sy+50);
      }
    }
  });

  // ── Cooking Stations ──
  const stns=G.day.stns;
  const stnW=Math.min(130,700/stns.length);
  const stnStartX=400-(stns.length*stnW)/2;

  stns.forEach((sdef,i)=>{
    const st=G.stations[sdef.id];
    const x=stnStartX+i*stnW+5,y=240,w=stnW-10,h=85;

    cx.fillStyle=st.burned?'#3a1208':st.done?'#1a2e18':st.cooking?'#2a1e14':('#1e1610');
    cx.strokeStyle=st.burned?'#f33':st.done?'#4c4':st.needsTap?'#fc2':'#4a3a2e';
    cx.lineWidth=st.needsTap?2.5:1.5;
    rr(x,y,w,h,8,true,true);

    // Station icon
    cx.font='26px sans-serif';cx.textAlign='center';
    cx.fillText(sdef.emoji,x+w/2,y+30);
    cx.font='bold 10px Georgia';cx.fillStyle='#c0a080';
    cx.fillText(sdef.name,x+w/2,y+46);

    // Cooking food
    if(st.cooking){
      cx.font='18px sans-serif';
      cx.fillText(st.cooking.emoji,x+w/2,y+67);

      // Progress bar
      const bw=w-16,bx=x+8,by=y+h-12;
      cx.fillStyle='#0e0906';rr(bx,by,bw,7,3,true,false);
      const pct=Math.min(st.progress,1);
      const burnPct=st.progress>1?Math.min((st.progress-1)/0.6,1):0;
      cx.fillStyle=st.burned?'#f22':st.done?(burnPct>0?`rgb(${68+187*burnPct},${204-180*burnPct},${68-60*burnPct})`:'#4c4'):'#d4570a';
      rr(bx,by,bw*pct,7,3,true,false);

      // Tap prompt
      if(st.needsTap){
        cx.font='bold 10px Georgia';cx.fillStyle='#fc2';
        cx.fillText('TAP! '+sdef.actionEmoji,x+w/2,y+h+12);
      }
    }
    if(st.done&&!st.burned){
      cx.font='bold 10px Georgia';cx.fillStyle='#4c4';
      cx.fillText('✅ COLLECT',x+w/2,y+h+12);
    }
    if(st.burned){
      cx.font='bold 10px Georgia';cx.fillStyle='#f44';
      cx.fillText('🔥 BURNED',x+w/2,y+h+12);
    }
  });

  // ── Plate Area ──
  const px=20,py=355,pw=200,ph=60;
  cx.fillStyle='#1e1610';cx.strokeStyle=G.plate?'#fc2':'#3a2a1e';cx.lineWidth=1.5;
  rr(px,py,pw,ph,8,true,true);
  cx.textAlign='center';cx.font='bold 10px Georgia';cx.fillStyle='#806040';
  cx.fillText('PLATE',px+pw/2,py+14);
  if(G.plate){
    cx.font='28px sans-serif';cx.fillText(G.plate.dish.emoji,px+50,py+46);
    cx.font='11px Georgia';cx.fillStyle='#e8d0a0';cx.textAlign='left';
    cx.fillText(G.plate.dish.name,px+75,py+38);
    if(G.plate.spice){cx.fillStyle=G.plate.spice.color;cx.fillText(G.plate.spice.emoji+' '+G.plate.spice.name,px+75,py+52);}
    // Spice button
    if(!G.plate.spice){
      cx.fillStyle='#5a3a20';rr(px+pw-55,py+30,50,22,5,true,false);
      cx.font='bold 9px Georgia';cx.fillStyle='#fc2';cx.textAlign='center';
      cx.fillText('SPICE',px+pw-30,py+45);
    }
    // Trash
    cx.fillStyle='#4a1a1a';rr(px+pw-55,py+5,50,22,5,true,false);
    cx.font='bold 9px Georgia';cx.fillStyle='#f88';cx.textAlign='center';
    cx.fillText('TRASH',px+pw-30,py+20);
  }else{
    cx.font='11px Georgia';cx.fillStyle='rgba(120,100,80,.4)';
    cx.fillText('Collect from station',px+pw/2,py+42);
  }

  // ── Food Menu (bottom) ──
  const my=430;
  cx.fillStyle='rgba(14,9,6,.92)';cx.fillRect(0,my-5,800,175);
  cx.fillStyle='#3a2a1e';cx.fillRect(0,my-5,800,2);

  cx.textAlign='center';cx.font='bold 10px Georgia';cx.fillStyle='#806040';
  cx.fillText('TAP DISH TO COOK',400,my+10);

  const dishes=G.day.rest.dishes;
  const dw=Math.min(120,750/dishes.length);
  const dsx=400-(dishes.length*dw)/2;

  dishes.forEach((d,i)=>{
    const dx=dsx+i*dw+4,dy=my+18,ddw=dw-8,ddh=68;
    const stFree=!G.stations[d.station]||!G.stations[d.station].cooking;
    cx.globalAlpha=stFree?1:0.3;
    cx.fillStyle='#1e1610';cx.strokeStyle=stFree?d.station==='grill'?'#c44':d.station==='fryer'?'#c82':d.station==='chop'?'#4a4':d.station==='pot'?'#48c':d.station==='oven'?'#c62':d.station==='saute'?'#ca4':d.station==='steamer'?'#8ac':'#aaa':'#333';
    cx.lineWidth=1;rr(dx,dy,ddw,ddh,6,true,true);
    cx.font='26px sans-serif';cx.textAlign='center';
    cx.fillText(d.emoji,dx+ddw/2,dy+30);
    cx.font='9px Georgia';cx.fillStyle=stFree?'#e8d0a0':'#555';
    cx.fillText(d.name,dx+ddw/2,dy+48);
    cx.font='8px Georgia';cx.fillStyle='#fc2';
    cx.fillText(d.value+'🪙',dx+ddw/2,dy+60);
    cx.globalAlpha=1;
  });

  // ── HUD ──
  cx.fillStyle='rgba(14,9,6,.9)';cx.fillRect(0,0,800,36);
  cx.fillStyle='#3a2a1e';cx.fillRect(0,36,800,1);

  cx.textAlign='left';cx.font='bold 13px Georgia';cx.fillStyle=rest.color;
  cx.fillText(rest.name,10,24);

  cx.textAlign='center';cx.font='bold 15px Georgia';cx.fillStyle='#fc2';
  cx.fillText('🪙 '+G.tipsEarned,400,24);

  // Timer
  cx.textAlign='right';
  const tpct=G.dayTimer/G.maxDayTime;
  cx.font='bold 13px Georgia';cx.fillStyle=tpct>.3?'#4c4':tpct>.15?'#cc0':'#f44';
  cx.fillText('⏱️ '+Math.ceil(G.dayTimer)+'s',790,16);
  cx.font='11px Georgia';cx.fillStyle='#a08060';
  cx.fillText(G.customersServed+'/'+G.day.maxCustomers+' served',790,30);

  if(G.combo>1){cx.textAlign='left';cx.font='bold 12px Georgia';cx.fillStyle='#f80';cx.fillText(G.combo+'x COMBO',160,24);}
}

    const x=175+i*80,y=225,w=70,h=90;

    cx.globalAlpha=1;
  });

  btn(300,360,200,35,'Cancel','#5a4020','#3a2a14');
}

// ── Day End ──
function drawDayEnd(){
  cx.fillStyle='#0e0906';cx.fillRect(0,0,800,600);

  cx.textAlign='center';cx.font='bold 36px Georgia';cx.fillStyle='#fc2';
  cx.fillText('Day Complete!',400,100);

  cx.font='italic 16px Georgia';cx.fillStyle=curRest().color;
  cx.fillText(curRest().name,400,130);

  // Stars
  const stars=G.day.resultStars;
  cx.font='44px sans-serif';
  for(let i=0;i<3;i++){cx.fillStyle=i<stars?'#fc2':'#333';cx.fillText('⭐',290+i*60,190);}

  cx.font='18px Georgia';cx.fillStyle='#e8d0a0';
  cx.fillText('Tips Earned: 🪙 '+G.day.resultTips,400,240);
  cx.fillText('Customers Served: '+G.customersServed+'/'+G.day.maxCustomers,400,270);
  cx.fillText('Customers Lost: '+G.customersLost,400,300);

  cx.font='14px Georgia';cx.fillStyle='#a08060';
  cx.fillText('Total Coins: 🪙 '+fmt(G.save.coins),400,340);

  btn(200,380,180,50,'▶ PLAY AGAIN','#d4570a','#a03808');
  btn(420,380,180,50,'🗺️ WORLD MAP','#5a4020','#3a2a14');
}

// ── Shop ──
function drawShop(){
  cx.fillStyle='#0e0906';cx.fillRect(0,0,800,600);
  cx.textAlign='center';cx.font='bold 28px Georgia';cx.fillStyle='#fc2';
  cx.fillText('🛒 Shop & Upgrades',400,40);
  cx.font='14px Georgia';cx.fillStyle='#fc2';
  cx.fillText('🪙 '+fmt(G.save.coins)+' coins',400,65);

  // Upgrades
  const ups=[
    {id:'cookSpeed',name:'Cook Speed',desc:'Dishes cook 10% faster',cost:100+G.save.upgrades.cookSpeed*150,max:5,emoji:'⚡'},
    {id:'patience',name:'Extra Patience',desc:'Customers wait 5s longer',cost:150+G.save.upgrades.patience*200,max:5,emoji:'⏳'},
    {id:'tipBonus',name:'Tip Bonus',desc:'Tips increased by 10%',cost:200+G.save.upgrades.tipBonus*250,max:5,emoji:'💰'},
  ];
  ups.forEach((u,i)=>{
    const x=100,y=90+i*80,w=600,h=68;
    const lvl=G.save.upgrades[u.id];const maxed=lvl>=u.max;
    cx.fillStyle='#1e1610';cx.strokeStyle=maxed?'#fc2':'#3a2a1e';cx.lineWidth=1;
    rr(x,y,w,h,8,true,true);
    cx.font='28px sans-serif';cx.textAlign='left';cx.fillText(u.emoji,x+15,y+42);
    cx.font='bold 14px Georgia';cx.fillStyle='#e8d0a0';cx.fillText(u.name+' (Lv '+lvl+'/'+u.max+')',x+55,y+28);
    cx.font='11px Georgia';cx.fillStyle='#806040';cx.fillText(u.desc,x+55,y+48);
    if(!maxed){
      const canBuy=G.save.coins>=u.cost;
      cx.fillStyle=canBuy?'#2a5a30':'#3a2020';rr(x+w-100,y+15,85,38,6,true,false);
      cx.font='bold 12px Georgia';cx.fillStyle=canBuy?'#fff':'#f44';cx.textAlign='center';
      cx.fillText('🪙 '+u.cost,x+w-57,y+39);
    }else{cx.font='bold 12px Georgia';cx.fillStyle='#fc2';cx.textAlign='right';cx.fillText('MAX',x+w-15,y+39);}
  });

  // Helpers
  cx.textAlign='center';cx.font='bold 16px Georgia';cx.fillStyle='#e8a040';
  cx.fillText('— Chef Helpers —',400,340);

  const helpers=[
    {id:'fry_guy',name:'Fry Guy',desc:'Auto-taps the deep fryer',cost:300,emoji:'👨‍🍳'},
    {id:'spice_guy',name:'Spice Guy',desc:'Auto-seasons your plates',cost:500,emoji:'🧑‍🍳'},
  ];
  helpers.forEach((h,i)=>{
    const x=100+i*320,y=360,w=280,h2=65;
    const owned=G.save.helpers[h.id];
    cx.fillStyle='#1e1610';cx.strokeStyle=owned?'#4c4':'#3a2a1e';cx.lineWidth=1;
    rr(x,y,w,h2,8,true,true);
    cx.font='28px sans-serif';cx.textAlign='left';cx.fillText(h.emoji,x+15,y+42);
    cx.font='bold 13px Georgia';cx.fillStyle='#e8d0a0';cx.fillText(h.name,x+55,y+28);
    cx.font='10px Georgia';cx.fillStyle='#806040';cx.fillText(h.desc,x+55,y+45);
    if(!owned){
      const canBuy=G.save.coins>=h.cost;
      cx.fillStyle=canBuy?'#2a5a30':'#3a2020';rr(x+w-90,y+15,75,35,6,true,false);
      cx.font='bold 11px Georgia';cx.fillStyle=canBuy?'#fff':'#f44';cx.textAlign='center';cx.fillText('🪙 '+h.cost,x+w-52,y+37);
    }else{cx.font='bold 12px Georgia';cx.fillStyle='#4c4';cx.textAlign='right';cx.fillText('✅ HIRED',x+w-15,y+37);}
  });

  // Spices
  cx.textAlign='center';cx.font='bold 16px Georgia';cx.fillStyle='#e8a040';
  cx.fillText('— Buy Spices —',400,450);
  SPICES.forEach((s,i)=>{
    const x=60+i*120,y=470,w=110,h2=65;
    cx.fillStyle='#1e1610';cx.strokeStyle=s.color;cx.lineWidth=1;
    rr(x,y,w,h2,6,true,true);
    cx.font='22px sans-serif';cx.textAlign='center';
    cx.fillText(s.emoji,x+w/2,y+25);
    cx.font='9px Georgia';cx.fillStyle='#e8d0a0';
    cx.fillText(s.name+' x'+(G.save.spicesOwned[s.id]||0),x+w/2,y+40);
    cx.fillStyle='#2a5a30';rr(x+15,y+45,w-30,16,4,true,false);
    cx.font='bold 9px Georgia';cx.fillStyle='#fff';
    cx.fillText('🪙 25 (+3)',x+w/2,y+57);
  });

  btn(300,555,200,35,'← Back','#5a4020','#3a2a14');
}

// ── Achievements Screen ──
function drawAchScreen(){
  cx.fillStyle='#0e0906';cx.fillRect(0,0,800,600);
  cx.textAlign='center';cx.font='bold 24px Georgia';cx.fillStyle='#fc2';
  cx.fillText('🏆 Crystal Collection ('+G.save.achievements.length+'/30)',400,35);

  const cols=6,cw=118,ch=85;
  const sx=400-(cols*cw)/2;
  ACH.forEach((a,i)=>{
    const c=i%cols,r=Math.floor(i/cols);
    const x=sx+c*cw+4,y=50+r*ch+4,w=cw-8,h=ch-8;
    const un=G.save.achievements.includes(a.id);
    cx.fillStyle=un?'rgba(245,197,66,.06)':'rgba(20,16,12,.5)';
    cx.strokeStyle=un?'#fc2':'#2a1e14';cx.lineWidth=1;
    rr(x,y,w,h,6,true,true);
    const img=G.achImages[a.id];
    if(img&&img.complete&&img.naturalWidth){
      cx.globalAlpha=un?1:0.15;
      cx.drawImage(img,x+w/2-18,y+8,36,36);
    }else{
      cx.font='24px sans-serif';cx.globalAlpha=un?1:0.15;cx.textAlign='center';
      cx.fillText(un?'💎':'🔒',x+w/2,y+36);
    }
    cx.globalAlpha=1;
    cx.font='8px Georgia';cx.fillStyle=un?'#fc2':'#555';cx.textAlign='center';
    cx.fillText(a.name,x+w/2,y+56);
    cx.font='7px Georgia';cx.fillStyle='#806040';
    cx.fillText(a.desc,x+w/2,y+67);
  });

  btn(325,555,150,32,'← Back','#5a4020','#3a2a14');
}

// ── Button helper ──
function btn(x,y,w,h,t,c1,c2){
  cx.fillStyle=c2;rr(x,y+3,w,h,8,true,false);
  cx.fillStyle=c1;rr(x,y,w,h,8,true,false);
  const sh=cx.createLinearGradient(x,y,x,y+h);sh.addColorStop(0,'rgba(255,255,255,.12)');sh.addColorStop(.5,'rgba(255,255,255,0)');cx.fillStyle=sh;rr(x,y,w,h,8,true,false);
  cx.textAlign='center';cx.font='bold 14px Georgia';cx.fillStyle='#fff';cx.fillText(t,x+w/2,y+h/2+5);
}

// ── INPUT ──
function gp(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*800,y:(e.clientY-r.top)/r.height*600}}
function hit(px,py,rx,ry,rw,rh){return px>=rx&&px<=rx+rw&&py>=ry&&py<=ry+rh}

function click(e){
  const{x,y}=gp(e);

  if(G.screen==='title'){
    if(hit(x,y,270,340,260,55)){G.screen='worldmap';return;}
    if(hit(x,y,270,410,260,45)){G.screen='achievements';return;}
    if(hit(x,y,270,465,260,45)){G.screen='shop';return;}
    return;
  }
  if(G.screen==='worldmap'){
    if(hit(x,y,700,10,80,30)){G.screen='title';return;}
    RESTAURANTS.forEach((r,i)=>{
      const rx=60+i*145,ry=80,rw=130,rh=420;
      if(!hit(x,y,rx,ry,rw,rh))return;
      const un=G.save.unlockedRestaurants.includes(i);
      if(un){G.save.currentRestaurant=i;G.screen='restaurant';return;}
      if(G.save.coins>=r.unlockCost){
        G.save.coins-=r.unlockCost;
        G.save.unlockedRestaurants.push(i);
        addFloat(rx+rw/2,ry+rh/2,'🔓 Unlocked!','#fc2',2);
        save();
      }
    });
    return;
  }
  if(G.screen==='restaurant'){
    if(hit(x,y,250,400,300,55)){startDay();return;}
    if(hit(x,y,310,475,180,35)){G.screen='worldmap';return;}
    return;
  }
  if(G.screen==='spiceRack'){
    SPICES.forEach((s,i)=>{
      if(hit(x,y,175+i*80,225,70,90)&&(G.save.spicesOwned[s.id]||0)>0){
        applySpice(s);G.screen='cooking';
      }
    });
    if(hit(x,y,300,360,200,35))G.screen='cooking';
    return;
  }
  if(G.screen==='cooking'){
    // Food menu
    const dishes=G.day.rest.dishes;
    const dw=Math.min(120,750/dishes.length);
    const dsx=400-(dishes.length*dw)/2;
    const my=430;
    dishes.forEach((d,i)=>{
      if(hit(x,y,dsx+i*dw+4,my+18,dw-8,68)){
        if(G.stations[d.station]&&!G.stations[d.station].cooking){startCook(d.station,d);}
      }
    });
    // Stations
    const stns=G.day.stns;
    const stnW=Math.min(130,700/stns.length);
    const stnStartX=400-(stns.length*stnW)/2;
    stns.forEach((sdef,i)=>{
      if(hit(x,y,stnStartX+i*stnW+5,240,stnW-10,85)){tapStation(sdef.id);}
    });
    // Serve to customer
    G.customers.forEach((c,ci)=>{
      const sx=120+c.seat*170;
      if(hit(x,y,sx-50,30,100,150)){
        if(G.plate&&c.state==='waiting')serveTo(ci);
      }
    });
    // Plate spice button
    if(G.plate&&!G.plate.spice&&hit(x,y,165,385,50,22)){G.screen='spiceRack';return;}
    // Plate trash
    if(G.plate&&hit(x,y,165,360,50,22)){G.plate=null;return;}
    return;
  }
  if(G.screen==='dayEnd'){
    if(hit(x,y,200,380,180,50)){startDay();return;}
    if(hit(x,y,420,380,180,50)){G.screen='worldmap';return;}
    return;
  }
  if(G.screen==='shop'){
    // Upgrades
    const ups=['cookSpeed','patience','tipBonus'];
    const costs=[100+G.save.upgrades.cookSpeed*150,150+G.save.upgrades.patience*200,200+G.save.upgrades.tipBonus*250];
    ups.forEach((u,i)=>{
      if(hit(x,y,600,105+i*80,85,38)&&G.save.upgrades[u]<5&&G.save.coins>=costs[i]){
        G.save.coins-=costs[i];G.save.upgrades[u]++;save();
        addFloat(400,90+i*80,'⬆️ Upgraded!','#4c4',1);
      }
    });
    // Helpers
    const helpers=[{id:'fry_guy',cost:300},{id:'spice_guy',cost:500}];
    helpers.forEach((h,i)=>{
      if(hit(x,y,410+i*320,375,75,35)&&!G.save.helpers[h.id]&&G.save.coins>=h.cost){
        G.save.coins-=h.cost;G.save.helpers[h.id]=true;save();
        addFloat(300+i*320,360,'✅ Hired!','#4c4',1.5);
      }
    });
    // Spices
    SPICES.forEach((s,i)=>{
      if(hit(x,y,75+i*120,515,80,16)&&G.save.coins>=25){
        G.save.coins-=25;G.save.spicesOwned[s.id]=(G.save.spicesOwned[s.id]||0)+3;save();
        addFloat(115+i*120,500,'+3 '+s.emoji,'#4c4',1);
      }
    });
    if(hit(x,y,300,555,200,35)){G.screen='title';return;}
    return;
  }
  if(G.screen==='achievements'){
    if(hit(x,y,325,555,150,32)){G.screen='title';return;}
    return;
  }
}

cv.addEventListener('click',click);
cv.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches[0])click({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})},{passive:false});

// ── PRELOAD ──
let loadCount=0,loadTotal=ACH.length+1;
function onLoad(){loadCount++;document.getElementById('lf').style.width=(loadCount/loadTotal*100)+'%';if(loadCount>=loadTotal)finishLoad();}
ACH.forEach(a=>{const img=new Image();img.onload=onLoad;img.onerror=onLoad;img.src='/assets/achievements/icon_achievements_crystal_'+a.id+'.png';G.achImages[a.id]=img;});
const iconImg=new Image();iconImg.onload=onLoad;iconImg.onerror=onLoad;iconImg.src='/assets/ui/icon.png';

setTimeout(finishLoad,4000);
let started=false;
function finishLoad(){if(started)return;started=true;load();document.getElementById('loading').classList.add('done');requestAnimationFrame(loop);}

let lt=0;
function loop(now){const dt=Math.min((now-lt)/1000,.05);lt=now;update(dt);draw();requestAnimationFrame(loop);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

})();
</script>
